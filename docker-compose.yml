services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: skillswap
      POSTGRES_USER: skillswap
      POSTGRES_PASSWORD: skillswap
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillswap -d skillswap"]
      interval: 5s
      timeout: 5s
      retries: 10
    # No volumes: data is discarded when the container stops

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_NAME: SkillSwap
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:8IiiQ7wr0fcCU78Fxm3lddqPJnGHJFiRUomJwD9F70Y=
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:8080
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: skillswap
      DB_USERNAME: skillswap
      DB_PASSWORD: skillswap
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stderr
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: skillswap
      REVERB_APP_KEY: skillswap-key
      REVERB_APP_SECRET: skillswap-secret
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
    depends_on:
      db:
        condition: service_healthy

  reverb:
    build:
      context: ./backend
      dockerfile: Dockerfile
    entrypoint: ["php", "artisan"]
    command: ["reverb:start", "--host=0.0.0.0", "--port=8080"]
    ports:
      - "8081:8080"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:8IiiQ7wr0fcCU78Fxm3lddqPJnGHJFiRUomJwD9F70Y=
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: skillswap
      REVERB_APP_KEY: skillswap-key
      REVERB_APP_SECRET: skillswap-secret
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
      REVERB_HOST: localhost
      REVERB_PORT: 8081
      REVERB_SCHEME: http
      CACHE_STORE: array
    depends_on:
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000/api
        VITE_REVERB_APP_KEY: skillswap-key
        VITE_REVERB_HOST: localhost
        VITE_REVERB_PORT: 8081
        VITE_REVERB_SCHEME: http
    ports:
      - "8080:80"
    depends_on:
      - backend
